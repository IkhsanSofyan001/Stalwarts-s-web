<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Yearbook 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue-light: #bfdbfe;
      --blue-mid:   #a5b4fc;
      --blue-dark:  #6366f1;
      --ink:        #1e293b;
      --muted:      #475569;
    }

    body {
      background: linear-gradient(135deg, #bfdbfe, #a5b4fc, #c4b5fd);
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAVBAR ─────────────────────────────── */
    nav {
      position: fixed;
      top: 20px;
      left: 40px;
      right: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,0,0,0.05);
      padding: 10px 20px;
      border-radius: 12px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; text-decoration: none;
    }
    .logo img { width: 40px; height: 40px; object-fit: contain; border-radius: 50%; }
    .logo span { font-size: 18px; font-weight: 600; color: var(--ink); }
    nav ul { display: flex; gap: 20px; list-style: none; }
    nav ul a {
      color: var(--ink); text-decoration: none; font-size: 14px;
      position: relative;
    }
    nav ul a::after {
      content: ""; position: absolute;
      width: 0%; height: 2px;
      background: var(--blue-dark);
      left: 0; bottom: -4px; transition: 0.3s;
    }
    nav ul a:hover::after { width: 100%; }

    /* ── PAGE HEADER ──────────────────────── */
    .page-header {
      padding: 140px 60px 20px;
      text-align: center;
    }
    .page-header h1 {
      font-family: 'Caveat', cursive;
      font-size: 80px;
      color: var(--ink);
      line-height: 1;
    }
    .page-header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── CONTENT WRAPPER ────────────────────── */
    .content {
      max-width: 1100px;
      margin: 60px auto 120px;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    /* ── GLASS CARD ─────────────────────────── */
    .glass-card {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 24px;
      padding: 40px 48px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.08), 0 2px 8px rgba(0,0,0,0.06);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue-dark);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: 'Caveat', cursive;
      font-size: 48px;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 16px;
    }

    .section-body {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 680px;
    }

    /* ── IDENTITY CARD (two-column) ─────────── */
    .identity {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    .identity-visual {
      background: rgba(99,102,241,0.08);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      border: 1px dashed rgba(99,102,241,0.25);
    }

    .identity-year {
      font-family: 'Caveat', cursive;
      font-size: 96px;
      font-weight: 700;
      color: var(--blue-dark);
      line-height: 1;
      opacity: 0.85;
    }

    .identity-school {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    /* ── STAT STRIP ─────────────────────────── */
    .stat-strip {
      display: flex;
      gap: 0;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .stat-item {
      flex: 1;
      padding: 28px 20px;
      text-align: center;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255,255,255,0.6);
    }
    .stat-item:last-child { border-right: none; }

    .stat-number {
      font-family: 'Caveat', cursive;
      font-size: 52px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    .stat-number span {
      color: var(--blue-dark);
    }

    .stat-desc {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── PILLARS / VALUES ───────────────────── */
    .pillars {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 28px;
    }

    .pillar {
      background: rgba(255,255,255,0.55);
      border-radius: 16px;
      padding: 24px 20px;
      border: 1px solid rgba(255,255,255,0.8);
      text-align: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .pillar:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(99,102,241,0.12);
    }

    .pillar-icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }

    .pillar-title {
      font-family: 'Caveat', cursive;
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .pillar-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── MOTTO BANNER ───────────────────────── */
    .motto-card {
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(165,180,252,0.25));
      backdrop-filter: blur(16px);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 24px;
      padding: 52px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .motto-card::before {
      content: "✦";
      position: absolute;
      font-size: 200px;
      color: rgba(99,102,241,0.05);
      top: -40px; right: -20px;
      line-height: 1;
      pointer-events: none;
    }

    .motto-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue-dark);
      margin-bottom: 16px;
    }

    .motto-text {
      font-family: 'Caveat', cursive;
      font-size: 52px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }

    .motto-sub {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    /* ── STAFF ROW ──────────────────────────── */
    .staff-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 28px;
      justify-content: center;
    }

    .staff-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 20px;
      padding: 24px 28px 20px;
      width: 350px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .staff-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(99,102,241,0.12);
    }

    .staff-photo {
      width: 300px;
      height: 300px;
      border-radius: 16px;
      object-fit: cover;
      background: #cbd5e1;
      flex-shrink: 0;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      margin-bottom: 14px;
    }

    .staff-name {
      font-family: 'Caveat', cursive;
      font-size: 32px;
      font-weight: 700;
      color: var(--ink);
      text-align: center;
    }

    .staff-role {
      font-size: 15px;
      color: var(--muted);
      margin-top: 3px;
      text-align: center;
    }

    /* ── FOOTER NOTE ────────────────────────── */
    .end-note {
      text-align: center;
      padding: 0 0 100px;
      font-family: 'Caveat', cursive;
      font-size: 28px;
      color: rgba(30,41,59,0.5);
    }

    /* ── FADE-IN ANIMATION ──────────────────── */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── RESPONSIVE ───────────────────────────── */
    @media (max-width: 768px) {
      nav { left: 16px; right: 16px; }
      .content { padding: 0 20px; }
      .glass-card { padding: 28px 24px; }
      .identity { grid-template-columns: 1fr; }
      .pillars { grid-template-columns: 1fr 1fr; }
      .stat-strip { flex-direction: column; }
      .stat-item { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.6); }
      .motto-card { padding: 36px 28px; }
      .motto-text { font-size: 38px; }
    }

    @media (max-width: 480px) {
      .pillars { grid-template-columns: 1fr; }
      .page-header h1 { font-size: 60px; }
    }
    /* ── LOGO TRIO ──────────────────────────── */
    .logo-trio {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 0 40px 60px;
    }

    .logo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo-item img {
      width: 220px;
      height: 220px;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      padding: 8px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.12), 0 2px 6px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.9);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .logo-item img:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(99,102,241,0.18), 0 4px 12px rgba(0,0,0,0.1);
    }

    .logo-caption {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      min-height: 16px;
    }

    .logo-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .logo-divider {
      font-size: 18px;
      color: rgba(99,102,241,0.3);
      margin-bottom: 20px;
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="logo">
      <img src="assets/images/logo.jpg" alt="logo">
      <span>Stalwarts Legacy</span>
    </a>
    <ul>
      <li><a href="members.html">Members</a></li>
      <li><a href="memories.html">Memories</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <!-- HEADER -->
  <div class="page-header">
    <h1>About Us</h1>
    <p id="heroSubtitle"></p>
  </div>

  <div class="content" id="content"></div>

  <div class="logo-trio" id="logoTrio"></div>
  <div class="end-note" id="endNote"></div>

  <script src="about-data.js"></script>
  <script>
    const d = aboutData;

    // ── Hero subtitle
    document.getElementById('heroSubtitle').textContent = d.subtitle;

    // ── End note
    document.getElementById('endNote').textContent = d.endNote;

    const content = document.getElementById('content');

    // ── ① WHO WE ARE
    content.innerHTML += `
      <div class="glass-card fade-in">
        <div class="identity">
          <div>
            <div class="section-label">Who We Are</div>
            <div class="section-title">The Stalwarts,<br>Class of ${d.identity.year}</div>
            ${d.identity.paragraphs.map((p, i) =>
              `<p class="section-body" ${i > 0 ? 'style="margin-top:14px"' : ''}>${p}</p>`
            ).join('')}
          </div>
          <div class="identity-visual">
            <div class="identity-year">${d.identity.year}</div>
            <div class="identity-school">✦ ${d.identity.schoolName} ✦</div>
            <div class="identity-school" style="margin-top:6px;font-weight:400;font-size:12px">${d.identity.department}</div>
          </div>
        </div>
      </div>`;

    // ── ② STATS
    content.innerHTML += `
      <div class="stat-strip fade-in">
        ${d.stats.map(s => `
          <div class="stat-item">
            <div class="stat-number">${s.number}</div>
            <div class="stat-desc">${s.label}</div>
          </div>`).join('')}
      </div>`;

    // ── ③ MOTTO
    content.innerHTML += `
      <div class="motto-card fade-in">
        <div class="motto-label">Our Motto</div>
        <div class="motto-text">"${d.motto.text}"</div>
        <p class="motto-sub">${d.motto.caption}</p>
      </div>`;

    // ── ④ OUR STORY
    content.innerHTML += `
      <div class="glass-card fade-in">
        <div class="section-label">Our Story</div>
        <div class="section-title">How it all began</div>
        ${d.story.paragraphs.map((p, i) =>
          `<p class="section-body" ${i > 0 ? 'style="margin-top:14px"' : ''}>${p}</p>`
        ).join('')}
      </div>`;

    // ── ⑤ TEACHERS
    content.innerHTML += `
      <div class="glass-card fade-in">
        <div class="section-label">The People Who Guided Us</div>
        <div class="section-title">Our Teachers</div>
        <p class="section-body">They showed up for us, even when it was hard. This page wouldn't exist without them.</p>
        <div class="staff-row">
          ${d.teachers.map(t => `
            <div class="staff-card">
              <img class="staff-photo" src="${t.photo}" alt="${t.name}">
              <div>
                <div class="staff-name">${t.name}</div>
                <div class="staff-role">${t.role}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;

    // ── LOGOS
    const logoTrio = document.getElementById('logoTrio');
    logoTrio.innerHTML = d.logos.map((logo, i) => `
      ${i > 0 ? '<div class="logo-divider">✦</div>' : ''}
      <div class="logo-item">
        <div class="logo-caption">${logo.caption}</div>
        <img src="${logo.src}" alt="${logo.label}">
        <div class="logo-label">${logo.label}</div>
      </div>`).join('');

    // ── Fade-in on scroll
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>

</body>
</html>
